<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>snag. — early access</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', sans-serif;
      background: #fff;
      color: #1a1a1a;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .card {
      background: #fff;
      border-radius: 24px;
      box-shadow: 0 4px 32px rgba(0,0,0,0.08);
      padding: 48px 40px;
      max-width: 420px;
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 24px;
    }

    .logo {
      font-size: 2.4rem;
      font-weight: 700;
      color: #d63031;
      letter-spacing: -1px;
    }

    .eyebrow {
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #aaa;
    }

    .headline {
      font-size: 1.5rem;
      font-weight: 700;
      text-align: center;
      line-height: 1.3;
      color: #1a1a1a;
    }

    .sub {
      font-size: 0.92rem;
      color: #777;
      text-align: center;
      line-height: 1.6;
    }

    .items-preview {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .item-chip {
      display: flex;
      align-items: center;
      gap: 12px;
      background: #f7f7f7;
      border-radius: 12px;
      padding: 10px 14px;
    }

    .item-avatar {
      width: 36px;
      height: 36px;
      border-radius: 8px;
      background: #e0e0e0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.7rem;
      font-weight: 600;
      color: #888;
      flex-shrink: 0;
    }

    .item-name {
      font-size: 0.85rem;
      font-weight: 500;
      color: #1a1a1a;
      flex: 1;
    }

    .item-right {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 3px;
    }

    .item-badge {
      font-size: 0.8rem;
      font-weight: 600;
      color: #d63031;
    }

    .item-savings {
      font-size: 0.68rem;
      font-weight: 600;
      color: #d63031;
      background: #fdf0f0;
      border-radius: 50px;
      padding: 2px 7px;
    }

    .form {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .form input[type="email"] {
      width: 100%;
      padding: 14px 18px;
      border: none;
      border-radius: 50px;
      background: #f2f2f2;
      font-family: inherit;
      font-size: 0.95rem;
      color: #1a1a1a;
      outline: none;
      transition: background 0.2s;
    }

    .form input[type="email"]:focus {
      background: #ebebeb;
    }

    .form input[type="email"]::placeholder {
      color: #bbb;
    }

    .btn {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 50px;
      background: #d63031;
      color: #fff;
      font-family: inherit;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
    }

    .btn:hover { background: #b52728; }
    .btn:active { transform: scale(0.98); }
    .btn:disabled { background: #e08080; cursor: not-allowed; }

    .status {
      font-size: 0.85rem;
      text-align: center;
      min-height: 1.2em;
      color: #777;
    }

    .status.success { color: #27ae60; font-weight: 500; }
    .status.error   { color: #d63031; }
  </style>
</head>
<body>
  <div class="card">
    <span class="logo">snagAI</span>

    <span class="eyebrow">Early Access</span>

    <h1 class="headline">Never miss a deal on<br/>the things you want.</h1>

    <p class="sub">Add items to your wishlist. We'll hunt down the best prices so you don't have to.</p>

    <div class="items-preview">
      <div class="item-chip">
        <div class="item-avatar">MP</div>
        <span class="item-name">MacBook Pro 14-inch</span>
        <div class="item-right">
          <span class="item-badge">$1,249</span>
          <span class="item-savings">9% off</span>
        </div>
      </div>
      <div class="item-chip">
        <div class="item-avatar">AP</div>
        <span class="item-name">Apple Pencil Pro</span>
        <div class="item-right">
          <span class="item-badge">$89</span>
          <span class="item-savings">31% off</span>
        </div>
      </div>
      <div class="item-chip">
        <div class="item-avatar">AA</div>
        <span class="item-name">Apple AirPods 4</span>
        <div class="item-right">
          <span class="item-badge">$109</span>
          <span class="item-savings">15% off</span>
        </div>
      </div>
    </div>

    <form class="form" id="waitlist-form">
      <input type="email" id="email" placeholder="your@email.com" required />
      <button type="submit" class="btn" id="submit-btn">Sign up!</button>
    </form>

    <p class="status" id="status"></p>
  </div>

  <script>
    const form = document.getElementById('waitlist-form');
    const btn = document.getElementById('submit-btn');
    const status = document.getElementById('status');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('email').value.trim();

      btn.disabled = true;
      btn.textContent = 'Sending...';
      status.textContent = '';
      status.className = 'status';

      try {
        const res = await fetch('http://localhost:8000/signup/', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email }),
        });

        if (!res.ok) {
          const err = await res.json();
          throw new Error(err.detail || 'Something went wrong.');
        }

        status.textContent = "You're on the list! We'll be in touch soon.";
        status.className = 'status success';
        form.reset();
      } catch (err) {
        status.textContent = err.message;
        status.className = 'status error';
      } finally {
        btn.disabled = false;
        btn.textContent = 'Sign up!';
      }
    });
  </script>
</body>
</html>
